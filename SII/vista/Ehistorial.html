<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel Alumno</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="../assets/alumnosistema.css">
</head>
<body>

  <header class="container-fluid">
    <div class="d-flex justify-content-between align-items-center px-3">
      <img src="../assets/imagenes/secretaria.png" alt="Logo SEP" class="logo-left">
      <div>
        <div>Sistema Integral de Información</div>
        <strong>INSTITUTO TECNOLOGICO DE MILPA ALTA</strong>
      </div>
      <img src="../assets/imagenes/nacional.png" alt="Logo TecNM" class="logo-right">
    </div>
  </header>

  <div class="container nav-buttons mt-3">
    <div class="d-flex justify-content-center flex-wrap gap-3">
        <div>
            <a href="Eregistro.html" class="btn btn-light">Registro</a>
          </div>
          <div>
            <a href="Ehistorial.html" class="btn btn-light">Historial Académico</a>
          </div>
          <div>
            <a href="Etramites.html" class="btn btn-light">Trámites</a>
          </div>
         
    </div>
  </div>

  
  
  

  <div class="welcome">
    Bienvenid(@)<br>
    Perla Angelica Hernandez Aguilar<br>
    (211070025)
  </div>

  <img src="../assets/imagenes/mapache.png" alt="Engranaje" class="gear-img">
  <h3 class="mb-4">Consulta de Historial</h3>

  <form onsubmit="mostrarHistorial(event)">
    <div class="row mb-3">
      <label class="col-sm-3 col-form-label">Tipo de persona</label>
      <div class="col-sm-9">
        <select class="form-select" id="tipo_persona" required>
          <option value="">Selecciona...</option>
          <option value="alumno">Alumno</option>
          <option value="docente">Docente</option>
        </select>
      </div>
    </div>

    <div class="row mb-3">
      <label class="col-sm-3 col-form-label">Matrícula / ID</label>
      <div class="col-sm-9">
        <input type="text" class="form-control" id="id_persona" required>
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Buscar</button>
  </form>

  <hr>

  <div id="resultado" class="mt-4"></div>

  <script>
    function mostrarHistorial(e) {
      e.preventDefault();

      const tipo = document.getElementById("tipo_persona").value;
      const id = document.getElementById("id_persona").value;
      const resultado = document.getElementById("resultado");

      if (!tipo || !id) {
        resultado.innerHTML = "<div class='alert alert-warning'>Por favor, completa todos los campos.</div>";
        return;
      }

      if (tipo === "alumno") {
        resultado.innerHTML = `
          <h5>Datos Generales</h5>
          <p><strong>Nombre:</strong> Juan Pérez</p>
          <p><strong>Matrícula/ID:</strong> ${id}</p>
          <p><strong>Carrera/Departamento:</strong> ISC</p>
          <p><strong>Semestre Actual:</strong> 4</p>
          <h5 class="mt-4">Materias Cursadas</h5>
          <table class="table table-bordered">
            <thead class="table-light">
              <tr>
                <th>Clave</th>
                <th>Materia</th>
                <th>Calificación</th>
                <th>Periodo</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>ISC-101</td>
                <td>Programación Básica</td>
                <td>95</td>
                <td>Enero - Junio 2023</td>
              </tr>
              <tr>
                <td>ISC-102</td>
                <td>Matemáticas Discretas</td>
                <td>88</td>
                <td>Enero - Junio 2023</td>
              </tr>
              <tr>
                <td>ISC-201</td>
                <td>Estructura de Datos</td>
                <td>90</td>
                <td>Agosto - Diciembre 2023</td>
              </tr>
            </tbody>
          </table>
        `;
      } else if (tipo === "docente") {
        resultado.innerHTML = `
          <h5>Datos Generales</h5>
          <p><strong>Nombre:</strong> Dra. María López</p>
          <p><strong>ID:</strong> ${id}</p>
          <p><strong>Departamento:</strong> Sistemas</p>
          <p><strong>Especialidad:</strong> Inteligencia Artificial</p>
          <h5 class="mt-4">Materias Impartidas</h5>
          <table class="table table-bordered">
            <thead class="table-light">
              <tr>
                <th>Clave</th>
                <th>Materia</th>
                <th>Grupo</th>
                <th>Periodo</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>ISC-301</td>
                <td>IA Aplicada</td>
                <td>3A</td>
                <td>Agosto - Diciembre 2023</td>
              </tr>
              <tr>
                <td>ISC-202</td>
                <td>Base de Datos</td>
                <td>2B</td>
                <td>Enero - Junio 2023</td>
              </tr>
            </tbody>
          </table>
        `;
      }
    }
  </script>

  

  <div class="home">
    <a href="Eprofesionales.html">
      <img src="../assets/imagenes/inicio.png" alt="Ir al inicio"><br>
      Inicio
    </a>
  </div>

  <div class="logout">
    <a href="index.html">
      <img src="../assets/imagenes/desconectar.png" alt="Cerrar sesión"><br>
      Cerrar sesión
    </a>
  </div>
  
</body>
</html>
