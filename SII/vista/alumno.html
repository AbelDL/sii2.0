<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login IT Milpa Alta</title>
  <link rel="stylesheet" href="../assets/alumno.css">
</head>
<body>

 <header>
        <div class="left">
            <img src="../assets/imagenes/secretaria.png" alt="Logo SEP" >
        </div>
        <div class="center">
            <div>Sistema Integral de Información</div>
            <div><strong>INSTITUTO TECNOLOGICO DE MILPA ALTA</strong></div>
        </div>
        <div class="right">
            <img src="../assets/imagenes/nacional.png" alt="Logo TecNM" >
        </div>
    </header>

  <div class="role-buttons">
    <div class="role-button-container">
      <button class="role-button" onclick="location.href='docente.html'">Docente</button>
      <img src="../assets/imagenes/p.png" alt="Docente">
    </div>
  
    <div class="logo-container">
      <img src="../assets/imagenes/tecnm-removebg-preview.png" alt="Logo IT Milpa Alta">
    </div>
  
    <div class="role-button-container">
      <button class="role-button">Alumno</button>
      <img src="../assets/imagenes/alumno.png" alt="Alumno">
    </div>
  </div>
  
  

  <div class="login-box">
    <div class="title-auth">Autenticación para acceso al sistema</div>
  
    <div class="styled-input">
      <input type="text" placeholder="No. Control:">
    </div>
  
    <div class="styled-input">
      <input type="password" placeholder="NIP:">
    </div>
  
    <br>
    <button>Ingresar</button>
  </div>
</body>
</html>
