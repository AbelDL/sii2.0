<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel Alumno</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="../assets/alumnosistema.css">
</head>
<body>

  <header class="container-fluid">
    <div class="d-flex justify-content-between align-items-center px-3">
      <img src="../assets/imagenes/secretaria.png" alt="Logo SEP" class="logo-left">
      <div>
        <div>Sistema Integral de Información</div>
        <strong>INSTITUTO TECNOLOGICO DE MILPA ALTA</strong>
      </div>
      <img src="../assets/imagenes/nacional.png" alt="Logo TecNM" class="logo-right">
    </div>
  </header>

  <div class="container nav-buttons mt-3">
    <div class="d-flex justify-content-center flex-wrap gap-3">
      <div>
        <a href="aydehorario.html" class="btn btn-light">Generar Horario</a>
      </div>
      <div>
        <a href="aydeseguimiento.html" class="btn btn-light">Seguimiento Docente</a>
      </div>
      <div>
        <a href="aydegrupos.html" class="btn btn-light">Grupos</a>
      </div>
      <div>
        <a href="aydealumnos.html" class="btn btn-light">Alumnos</a>
      </div>
      <div>
        <a href="aydedocente.html" class="btn btn-light">Docente</a>
      </div>
    </div>
  </div>

  <div class="welcome">
    Bienvenid(@)<br>
    Perla Angelica Hernandez Aguilar<br>
    (211070025)
  </div>

  <img src="../assets/imagenes/mapache.png" alt="Engranaje" class="gear-img">

  <div class="container mt-4">
    <div class="row">
      <div class="col-md-6">
        <div class="cuadro-azul p-3">
          <h5>Seleccionar Carrera</h5>
          <select id="boletaSelect" class="form-control mt-3" onchange="mostrarBusqueda()">
            <option value="">Carrera</option>
            <optgroup label="Semestre">
              <option value="Ingeniería en sistemas computacionales">Ingeniería en sistemas computacionales</option>
              <option value="Ingeniería en Gestión Empresarial">Ingeniería en Gestión Empresarial</option>
              <option value="Ingeniería en Alimentos">Ingeniería en Alimentos</option>
              <option value="Ingeniería en Bioquímica">Ingeniería en Bioquímica</option>
            </optgroup>
          </select>
        </div>
      </div>

      <div class="col-md-6" id="busquedaDiv" style="display:none;">
        <div id="buscar" class="vista-buscar">
          <p class="text-muted">Buscar:</p>
          <form action="resultados.html" method="get" onsubmit="mostrarFormulario(event)">
            <input type="text" id="buscar" name="buscar" placeholder="Introduce tu búsqueda" class="form-control">
            <button type="submit" class="btn btn-outline-primary mt-2">Buscar</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Formulario de seguimiento docente, inicialmente oculto -->
    <div id="seguimientoDocente" class="row mt-4" style="display:none;">
      <div class="col-md-12">
        <div class="p-3">
          <h5>Seguimiento Docente</h5>
          <form action="#" method="post">
            <div class="form-row">
              <div class="col-md-6 mb-3">
                <label for="id">ID</label>
                <input type="text" class="form-control" id="id" value="001" readonly>
              </div>
              <div class="col-md-6 mb-3">
                <label for="docente">Docente</label>
                <input type="text" class="form-control" id="docente" value="Juan Pérez" readonly>
              </div>
            </div>
            <div class="form-row">
              <div class="col-md-6 mb-3">
                <label for="asistencia">Asistencia (%)</label>
                <input type="text" class="form-control" id="asistencia" value="90%" readonly>
              </div>
              <div class="col-md-6 mb-3">
                <label for="unidad1">Unidad 1</label>
                <input type="text" class="form-control" id="unidad1" value="80%" readonly>
              </div>
            </div>
            <div class="form-row">
              <div class="col-md-6 mb-3">
                <label for="unidad2">Unidad 2</label>
                <input type="text" class="form-control" id="unidad2" value="Completo"readonly>
              </div>
              <div class="col-md-6 mb-3">
                <label for="unidad3">Unidad 3</label>
                <input type="text" class="form-control" id="unidad3" value="Completo" readonly>
              </div>
            </div>
            <div class="form-row">
              <div class="col-md-6 mb-3">
                <label for="unidad4">Unidad 4</label>
                <input type="text" class="form-control" id="unidad4" value="Completo" readonly>
              </div>
              <div class="col-md-6 mb-3">
                <label for="final">Final</label>
                <input type="text" class="form-control" id="final" value="" readonly>
              </div>
            </div>
            <div class="form-row">
              <div class="col-md-6 mb-3">
                <label for="evaluacion">Evaluación de Alumnos (%)</label>
                <input type="text" class="form-control" id="evaluacion" value="75%" readonly>
              </div>
            </div>
            <div class="form-row">
              <div class="col-md-12 mb-3">
                <label for="observaciones">Observaciones</label>
                <textarea class="form-control" id="observaciones" rows="4">Excelente desempeño, se recomienda continuar con el buen trabajo.</textarea>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="home">
    <a href="aydesistema.html">
      <img src="../assets/imagenes/inicio.png" alt="Ir al inicio"><br>
      Inicio
    </a>
  </div>
  <div class="logout">
    <a href="index.html">
      <img src="../assets/imagenes/desconectar.png" alt="Cerrar sesión"><br>
      Cerrar sesión
    </a>
  </div>

  <script>
    function mostrarBusqueda() {
      var carreraSelect = document.getElementById("boletaSelect");
      var busquedaDiv = document.getElementById("busquedaDiv");
      if (carreraSelect.value) {
        busquedaDiv.style.display = "block"; // Mostrar búsqueda
      } else {
        busquedaDiv.style.display = "none"; // Ocultar búsqueda si no se selecciona una carrera
      }
    }

    function mostrarFormulario(event) {
      event.preventDefault(); // Prevenir el envío del formulario
      var seguimientoDocente = document.getElementById("seguimientoDocente");
      seguimientoDocente.style.display = "block"; // Mostrar el formulario de seguimiento docente
    }
  </script>

</body>
</html>
